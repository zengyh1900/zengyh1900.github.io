<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Girl avatar icon</title>
  <desc id="desc">A minimalist girl avatar with dark hair and blue hair tips on a white background.</desc>
