name: Sync CV to Overleaf

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-overleaf:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OVERLEAF_REMOTE_URL: ${{ secrets.OVERLEAF_REMOTE_URL }}
      OVERLEAF_GIT_TOKEN: ${{ secrets.OVERLEAF_GIT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check generators
        run: node --check scripts/render-cv.mjs && node --check scripts/render-all.mjs

      - name: Render CV
        run: node scripts/render-cv.mjs --out cv

      - name: Push to Overleaf
        if: env.OVERLEAF_REMOTE_URL != ''
        run: |
          if [ -n "$OVERLEAF_GIT_TOKEN" ]; then
            AUTH_HEADER="$(printf 'git:%s' "$OVERLEAF_GIT_TOKEN" | base64 | tr -d '\n')"
            git -c http.extraHeader="AUTHORIZATION: basic $AUTH_HEADER" clone --branch main "$OVERLEAF_REMOTE_URL" overleaf-repo
          else
            git clone --branch main "$OVERLEAF_REMOTE_URL" overleaf-repo
          fi

          find overleaf-repo -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R cv/. overleaf-repo/

          cd overleaf-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No CV changes to sync."
            exit 0
          fi

          git commit -m "sync cv from ${GITHUB_SHA}"
          if [ -n "$OVERLEAF_GIT_TOKEN" ]; then
            git -c http.extraHeader="AUTHORIZATION: basic $AUTH_HEADER" push origin main
          else
            git push origin main
          fi

      - name: Skip Overleaf sync
        if: env.OVERLEAF_REMOTE_URL == ''
        run: echo "::warning::OVERLEAF_REMOTE_URL is not configured; rendered CV but skipped Overleaf push."
